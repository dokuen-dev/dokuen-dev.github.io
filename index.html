<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dokuen-dev - App Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-body: #fafafa;
      --bg-surface: #ffffff;
      --text-main: #111827;
      --text-muted: #4b5563;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-body);
      color: var(--text-main);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }
    
    a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    header {
      background-color: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 5%;
      display: flex;
      align-items: center;
    }

    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-main);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 5%;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 2rem;
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    .app-card {
      background-color: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .app-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .app-card h2 a {
      color: var(--text-main);
    }

    .app-card h2 a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    .app-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 500;
      background-color: var(--accent);
      color: white;
      border: 1px solid var(--accent);
    }

    .btn:hover {
      background-color: var(--accent-hover);
      text-decoration: none;
      color: white;
    }

    footer {
      background-color: var(--bg-surface);
      border-top: 1px solid var(--border);
      padding: 2rem 5%;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .footer-links {
      margin-bottom: 1rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">dokuen-dev</div>
  </header>

  <main>
    <h1>Apps</h1>
    
    <div class="app-card">
      <h2><a href="https://github.com/dokuen-dev/dokuen-reader">Dokuen Japanese Reader</a></h2>
      <p>A powerful Japanese reading assistant and OCR tool designed for seamless immersion and learning.</p>
      <a href="https://github.com/dokuen-dev/dokuen-reader" class="btn">View App Details</a>
    </div>

    <div class="app-card">
      <h2>Dokuen Chinese Reader</h2>
      <p>Coming soon.</p>
    </div>
  </main>

</body>
</html>
